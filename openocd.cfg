# openocd.cfg — PicoPiAndPortable debug configuration
#
# Targets the RP2040 (two Cortex-M0+ cores) via SWD.
#
# Usage:
#   openocd -f openocd.cfg
#
# Then in a second terminal:
#   gdb-multiarch -x ppap.gdb build/ppap.elf
#
# ── Adapter selection ────────────────────────────────────────────────────────
#
# Uncomment the block that matches your debug adapter.
# Default: Picoprobe (a second Pico running Picoprobe firmware via CMSIS-DAP).
#
# Option A — Picoprobe / any CMSIS-DAP adapter (default)
source [find interface/cmsis-dap.cfg]

# Option B — Raspberry Pi GPIO bit-bang (Pi used as SWD adapter)
# source [find interface/raspberrypi-swd.cfg]

# Option C — J-Link
# source [find interface/jlink.cfg]

# Option D — ST-Link v2 (generic)
# source [find interface/stlink.cfg]

# ── Target (Core 0 only) ──────────────────────────────────────────────────────
# The RP2040 has two Cortex-M0+ cores.  By default rp2040.cfg creates both
# targets (ports 3333 and 3334).  When Core 0 hits a breakpoint, OpenOCD
# must halt Core 1 before notifying GDB — if Core 1 doesn't respond promptly
# (it sits in the boot ROM spin loop), GDB's `continue` never stops.
#
# Fix: set USE_CORE 0 so only Core 0 is managed.  Core 1 is unused in Phase 0;
# add it back (remove this line) when multicore work begins.
set USE_CORE 0
source [find target/rp2040.cfg]

# ── Adapter speed ────────────────────────────────────────────────────────────
# 5000 kHz (5 MHz) is reliable at 133 MHz system clock.
# Reduce to 1000 if you see connection errors.
adapter speed 5000

# ── Breakpoints ──────────────────────────────────────────────────────────────
# The RP2040 XIP flash (0x10000000–0x10FFFFFF) is read-only at runtime;
# OpenOCD cannot patch in software BKPT instructions there.  Force hardware
# breakpoints globally so that `break` in GDB always works in flash.
# The Cortex-M0+ FPB provides 4 hardware breakpoint comparators.
gdb_breakpoint_override hard
